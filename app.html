<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolão Copa 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/app.css">
  <style>
    /* LIVE BAR */
    .live-bar{background:var(--bg-2);border-bottom:1px solid var(--border);padding:8px 1.25rem;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
    .live-bar::-webkit-scrollbar{display:none}
    .lc{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;min-width:170px;display:flex;align-items:center;gap:8px;}
    .lc.live{border-color:#ef4444;box-shadow:0 0 8px rgba(239,68,68,0.12);}
    .lt{flex:1;display:flex;flex-direction:column;gap:3px;}
    .lr{display:flex;align-items:center;justify-content:space-between;gap:6px;}
    .ln{font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:105px;font-size:0.78rem;}
    .lsc{font-weight:800;font-size:0.88rem;color:var(--gold);}
    .lmeta{font-size:0.64rem;color:var(--text-3);margin-top:2px;}
    .llb{display:inline-flex;align-items:center;gap:3px;background:rgba(239,68,68,0.15);color:#ef4444;font-size:0.6rem;font-weight:800;padding:1px 5px;border-radius:99px;}
    .llb::before{content:'';width:4px;height:4px;border-radius:50%;background:#ef4444;animation:livePulse 1s infinite;}
    .ldot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
    .dl{background:#ef4444;animation:livePulse 1s infinite;}
    .dff{background:var(--green);}
    .dsc{background:var(--text-3);}
    .ri{display:flex;align-items:center;gap:8px;font-size:0.7rem;color:var(--text-3);padding:3px 1.25rem 5px;}
    .rb2{background:none;border:none;color:var(--gold);font-size:0.7rem;cursor:pointer;font-family:inherit;}

    /* TABS */
    .tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
    .tab{padding:6px 14px;background:var(--bg-3);border:1px solid var(--border);border-radius:99px;font-size:0.78rem;font-weight:600;color:var(--text-2);cursor:pointer;transition:all 0.2s;}
    .tab.active{background:var(--gold);color:#0D0D1A;border-color:var(--gold);}
    .tsec{display:none;}
    .tsec.active{display:block;}

    /* GROUPS BRACKET */
    .gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:0.8rem;}
    .gc{border-radius:12px;overflow:hidden;background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow-sm);}
    .gh{background:var(--gold);color:#0D0D1A;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
    .gh h3{font-size:0.85rem;font-weight:800;}
    .gh span{font-size:0.68rem;opacity:0.65;}
    .gt{width:100%;border-collapse:collapse;}
    .gt th{font-size:0.62rem;font-weight:700;text-transform:uppercase;color:var(--text-3);padding:5px 12px 4px;text-align:left;border-bottom:1px solid var(--border-2);}
    .gt th:not(:first-child){text-align:center;}
    .gt td{padding:6px 12px;font-size:0.77rem;border-bottom:1px solid var(--border-2);color:var(--text);}
    .gt td:not(:first-child){text-align:center;color:var(--text-2);font-size:0.74rem;}
    .gt tr:last-child td{border-bottom:none;}
    .tc{display:flex;align-items:center;gap:5px;}
    .qd{width:4px;height:4px;border-radius:50%;background:var(--green);flex-shrink:0;}
    .t3d{width:4px;height:4px;border-radius:50%;background:var(--gold);flex-shrink:0;}
    .ed{width:4px;height:4px;flex-shrink:0;}

    /* KO BRACKET TREE */
    .kow{overflow-x:auto;padding-bottom:1rem;}
    .kot{display:flex;align-items:stretch;min-width:860px;}
    .koc{display:flex;flex-direction:column;border-right:1px solid var(--border-2);flex:1;}
    .koc:last-child{border-right:none;}
    .koch{text-align:center;font-size:0.63rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--gold);padding:9px 4px 7px;border-bottom:1px solid var(--border);background:var(--bg-3);}
    .kocm{display:flex;flex-direction:column;justify-content:space-around;flex:1;padding:5px 3px;gap:4px;}
    .km{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;min-width:100px;}
    .km.klive{border-color:#ef4444;}
    .km.kfinal{border-color:var(--gold);box-shadow:0 0 16px rgba(212,175,55,0.2);}
    .kr{display:flex;align-items:center;justify-content:space-between;padding:5px 7px;font-size:0.7rem;font-weight:500;min-height:26px;gap:3px;}
    .kr:first-child{border-bottom:1px solid var(--border-2);}
    .kr.win{background:rgba(212,175,55,0.1);font-weight:700;}
    .kr.lose{opacity:0.4;}
    .kn{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;}
    .ktbd{color:var(--text-3);font-style:italic;font-size:0.68rem;}
    .ksc{font-weight:800;font-size:0.78rem;color:var(--gold);}
    .champ-col{display:flex;flex-direction:column;min-width:100px;}
    .champ-in{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 5px;}
    .champ-box{background:var(--card);border:2px solid var(--gold);border-radius:12px;padding:1rem 0.6rem;text-align:center;width:100%;box-shadow:0 0 28px rgba(212,175,55,0.22);}
    .champ-tr{font-size:1.8rem;display:block;margin-bottom:4px;}
    .champ-lbl{font-size:0.58rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--gold);}
    .champ-nm{font-size:0.82rem;font-weight:800;color:var(--text);margin-top:4px;}

    /* PICK'EM */
    .pts-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;}
    .pts-c{flex:1;min-width:75px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;box-shadow:var(--shadow-sm);}
    .pts-v{font-size:1.5rem;font-weight:900;line-height:1;}
    .pts-l{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);margin-top:3px;font-weight:600;}

    /* Phase block collapse */
    .phase-block{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm);margin-bottom:0.75rem;}
    .phase-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none;transition:background 0.15s;}
    .phase-hdr:hover{background:var(--bg-3);}
    .phase-hdr-l{display:flex;align-items:center;gap:10px;}
    .phase-icon{font-size:1.1rem;}
    .phase-title{font-size:0.9rem;font-weight:700;color:var(--text);}
    .phase-sub{font-size:0.72rem;color:var(--text-3);margin-top:1px;}
    .phase-hdr-r{display:flex;align-items:center;gap:10px;}
    .phase-summary{font-size:0.75rem;font-weight:600;color:var(--gold);}
    .phase-chev{font-size:0.75rem;color:var(--text-3);transition:transform 0.2s;display:inline-block;}
    .phase-chev.open{transform:rotate(180deg);}
    .phase-body{display:none;border-top:1px solid var(--border);}
    .phase-body.open{display:block;}

    /* Pick grid — igual ao print: cards por grupo/confronto */
    .pick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:0.85rem;padding:14px;}

    /* Pick card individual */
    .pick-card{background:var(--bg-3);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
    .pick-card-head{background:var(--gold);color:#0D0D1A;padding:7px 12px;display:flex;align-items:center;justify-content:space-between;}
    .pick-card-head span{font-size:0.78rem;font-weight:800;}
    .pick-card-head small{font-size:0.65rem;opacity:0.7;}

    /* TIME no card — drag source + drop target */
    .pick-team-list{list-style:none;padding:4px 0;}
    .pick-team-row{
      display:flex;align-items:center;gap:8px;
      padding:7px 12px;border-bottom:1px solid var(--border-2);
      transition:background 0.15s;
    }
    .pick-team-row:last-child{border-bottom:none;}
    .pick-team-row.drag-over{background:var(--gold-bg);border-color:var(--gold);}
    .pick-pos-badge{
      width:20px;height:20px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:0.68rem;font-weight:800;flex-shrink:0;
    }
    .pos-1{background:var(--green);color:#fff;}
    .pos-2{background:rgba(34,197,94,0.25);color:var(--green);}
    .pos-3{background:var(--gold-bg);color:var(--gold);}
    .pos-4{background:var(--bg-2);color:var(--text-3);}
    .pick-team-name{flex:1;font-size:0.8rem;font-weight:500;color:var(--text);}
    .pick-pts-badge{font-size:0.65rem;font-weight:700;padding:2px 6px;border-radius:99px;flex-shrink:0;}
    .pts-ok{background:var(--green-bg);color:var(--green);}
    .pts-partial{background:var(--gold-bg);color:var(--gold-dark);}
    .pts-err{background:var(--red-bg);color:var(--red);}

    /* Drop zone para fases de mata-mata (recebe chips arrastados) */
    .mata-pick-card{background:var(--bg-3);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
    .mata-pick-head{background:var(--gold);color:#0D0D1A;padding:7px 12px;font-size:0.78rem;font-weight:800;display:flex;align-items:center;justify-content:space-between;}
    .mata-drop-zone{
      min-height:44px;padding:6px 8px;
      display:flex;flex-direction:column;gap:4px;
    }
    .mata-drop-zone.over{background:var(--gold-bg);}
    .mata-chip{
      display:flex;align-items:center;gap:6px;
      padding:5px 8px;border-radius:6px;
      background:var(--card);border:1px solid var(--border);
      font-size:0.78rem;font-weight:500;color:var(--text);
      cursor:grab;user-select:none;
    }
    .mata-chip.correct{border-color:rgba(22,163,74,0.4);background:var(--green-bg);color:var(--green);}
    .mata-chip.wrong{border-color:rgba(220,38,38,0.3);background:var(--red-bg);color:var(--red);}
    .mata-chip .rm{margin-left:auto;font-size:0.6rem;cursor:pointer;opacity:0.5;padding:0 2px;}
    .mata-chip .rm:hover{opacity:1;}
    .mata-hint{font-size:0.72rem;color:var(--text-3);font-style:italic;padding:4px 6px;}

    /* Source chips pool (times disponíveis para arrastar) */
    .phase-pool{padding:10px 14px;border-bottom:1px solid var(--border-2);background:var(--bg-2);}
    .phase-pool-lbl{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);margin-bottom:7px;}
    .chip-pool{display:flex;flex-wrap:wrap;gap:5px;}
    .source-chip{
      display:inline-flex;align-items:center;gap:5px;
      padding:4px 10px;border-radius:99px;
      background:var(--bg-3);border:1px solid var(--border);
      font-size:0.76rem;font-weight:500;color:var(--text);
      cursor:grab;user-select:none;transition:all 0.15s;
    }
    .source-chip:hover{border-color:var(--gold);background:var(--gold-bg);}
    .source-chip.dragging{opacity:0.3;}
    .source-chip.used{opacity:0.25;cursor:default;pointer-events:none;}

    @media(max-width:640px){.gg,.pick-grid{grid-template-columns:1fr;}.kot{min-width:650px;}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-brand"><span class="topbar-trophy">🏆</span><span class="topbar-title">Bolão Copa <strong>2026</strong></span></div>
    <div class="topbar-actions">
      <button class="btn-dark-toggle" onclick="toggleDark()"><span id="dkI">🌙</span><span id="dkL">Escuro</span></button>
      <div class="user-menu">
        <div class="user-avatar" id="uAv">--</div>
        <div class="user-dropdown" id="uDd">
          <div class="user-info"><strong id="uNm">Usuário</strong><small id="uEm"></small></div>
          <hr><button onclick="doLogout()">Sair</button>
        </div>
      </div>
    </div>
  </header>

  <div id="liveWrap" style="display:none">
    <div class="live-bar" id="liveBar"></div>
    <div class="ri"><span id="lrT"></span><button class="rb2" onclick="fetchLive()">↻ Atualizar</button></div>
  </div>

  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="switchPage('brackets',this)"><span class="nav-icon">🗂</span><span>Chaveamento</span></button>
    <button class="nav-tab" onclick="switchPage('pickem',this)"><span class="nav-icon">🎯</span><span>Palpites</span></button>
    <button class="nav-tab" onclick="switchPage('ranking',this)"><span class="nav-icon">🏅</span><span>Ranking</span></button>
  </nav>

  <main class="app-main">
    <section class="page active" id="page-brackets">
      <div class="page-header">
        <h2>Copa do Mundo <span class="gold">2026</span></h2>
        <div class="live-pill"><span class="live-dot"></span>Tempo real</div>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="swTab('tGrp',this)">📊 Grupos</button>
        <button class="tab" onclick="swTab('tKO',this)">🏆 Mata-Mata</button>
      </div>
      <div class="tsec active" id="tGrp">
        <div id="groupsGrid" class="gg"><div class="loading-state"><div class="spinner"></div> Carregando...</div></div>
      </div>
      <div class="tsec" id="tKO">
        <div class="kow"><div id="koTree"><div class="loading-state"><div class="spinner"></div> Carregando...</div></div></div>
      </div>
    </section>

    <section class="page" id="page-pickem">
      <div class="page-header">
        <h2>🎯 Meus Palpites</h2>
        <button class="btn-save-all" onclick="saveAllPicks()">💾 Salvar tudo</button>
      </div>
      <div class="pts-row">
        <div class="pts-c"><div class="pts-v gold" id="ptT">0</div><div class="pts-l">Total pts</div></div>
        <div class="pts-c"><div class="pts-v green" id="ptA">0</div><div class="pts-l">Acertos</div></div>
        <div class="pts-c"><div class="pts-v red" id="ptE">0</div><div class="pts-l">Erros</div></div>
        <div class="pts-c"><div class="pts-v" style="color:var(--text-3)" id="ptP">0</div><div class="pts-l">Pendentes</div></div>
      </div>
      <div id="pickPhases"></div>
    </section>

    <section class="page" id="page-ranking">
      <div class="page-header"><h2>🏅 Ranking</h2><button class="btn-outline-sm" onclick="loadRanking()">↻</button></div>
      <div id="rankList"><div class="loading-state"><div class="spinner"></div></div></div>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
  var SB_URL='https://olzcsczypoaqpntzfbsv.supabase.co';
  var SB_KEY='sb_publishable_GD9R_nDQNxlZY5F0lNaCnw_CUAKm6eX';
  var sb,ME,PROF;
  var GROUPS=[],MATCHES=[];
  var pickLoaded=false;

  // PICKS por fase: cada fase tem N slots = lista de times escolhidos pelo usuário
  // picks.F32 = ['Brazil','France',...] (32 times)
  // picks.F16 = [...] (16 times) — deve ser subconjunto de F32
  // picks.F8  = [...] (8 times)  — deve ser subconjunto de F16
  // picks.F4  = [...] (4 times)
  // picks.F2  = [...] (2 times)
  // picks.F1  = [...] (1 time = campeão)
  var picks = {F32:[],F16:[],F8:[],F4:[],F2:[],F1:[]};

  var PHASES = [
    {id:'F32',label:'Fase de 32',icon:'⚽',slots:32,pts:3,desc:'Arraste os 32 times que vão avançar dos grupos'},
    {id:'F16',label:'Fase de 16',icon:'🔥',slots:16,pts:5,desc:'Dos 32 acima, quem avança para as Oitavas?'},
    {id:'F8', label:'Oitavas de Final',icon:'⚡',slots:8, pts:8, desc:'Dos 16 acima, quem avança para as Quartas?'},
    {id:'F4', label:'Quartas de Final',icon:'🎯',slots:4, pts:10,desc:'Dos 8 acima, quem chega à Semifinal?'},
    {id:'F2', label:'Semifinal',icon:'🌟',slots:2, pts:15,desc:'Dos 4 acima, quem chega à Final?'},
    {id:'F1', label:'Campeão 🏆',icon:'🏆',slots:1, pts:25,desc:'Dos 2 finalistas, quem vai ser Campeão?'},
  ];

  // Todos os 48 times da Copa 2026 para a Fase 32
  var ALL48=['Mexico','South Korea','Czechia','South Africa','Switzerland','Canada','Qatar','Bosnia and Herzegovina','Scotland','Morocco','Brazil','Haiti','United States','Australia','Turkey','Paraguay','Germany','Ivory Coast','Ecuador','Curaçao','Sweden','Japan','Netherlands','Tunisia','New Zealand','Iran','Belgium','Egypt','Uruguay','Saudi Arabia','Spain','Cape Verde Islands','France','Senegal','Iraq','Norway','Algeria','Argentina','Jordan','Austria','Congo DR','Colombia','Portugal','Uzbekistan','England','Ghana','Croatia','Panama'];

  var F={'Brazil':'🇧🇷','Germany':'🇩🇪','France':'🇫🇷','Argentina':'🇦🇷','Spain':'🇪🇸','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Portugal':'🇵🇹','Netherlands':'🇳🇱','Belgium':'🇧🇪','Italy':'🇮🇹','Uruguay':'🇺🇾','Mexico':'🇲🇽','United States':'🇺🇸','Canada':'🇨🇦','Japan':'🇯🇵','South Korea':'🇰🇷','Australia':'🇦🇺','Morocco':'🇲🇦','Senegal':'🇸🇳','Ecuador':'🇪🇨','Croatia':'🇭🇷','Switzerland':'🇨🇭','Poland':'🇵🇱','Denmark':'🇩🇰','Serbia':'🇷🇸','Saudi Arabia':'🇸🇦','Iran':'🇮🇷','Cameroon':'🇨🇲','Tunisia':'🇹🇳','Qatar':'🇶🇦','Wales':'🏴󠁧󠁢󠁷󠁬󠁳󠁿','Costa Rica':'🇨🇷','Ghana':'🇬🇭','Colombia':'🇨🇴','New Zealand':'🇳🇿','DR Congo':'🇨🇩','Congo DR':'🇨🇩','Venezuela':'🇻🇪','Panama':'🇵🇦','Algeria':'🇩🇿','Nigeria':'🇳🇬','Egypt':'🇪🇬','South Africa':'🇿🇦','Ivory Coast':'🇨🇮','Mali':'🇲🇱','Tanzania':'🇹🇿','Slovenia':'🇸🇮','Slovakia':'🇸🇰','Austria':'🇦🇹','Hungary':'🇭🇺','Romania':'🇷🇴','Ukraine':'🇺🇦','Turkey':'🇹🇷','Greece':'🇬🇷','Albania':'🇦🇱','Paraguay':'🇵🇾','Chile':'🇨🇱','Bolivia':'🇧🇴','Honduras':'🇭🇳','El Salvador':'🇸🇻','Jamaica':'🇯🇲','Indonesia':'🇮🇩','Thailand':'🇹🇭','Vietnam':'🇻🇳','China PR':'🇨🇳','Iraq':'🇮🇶','Jordan':'🇯🇴','UAE':'🇦🇪','Georgia':'🇬🇪','Czechia':'🇨🇿','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Norway':'🇳🇴','Sweden':'🇸🇪','Iceland':'🇮🇸','Ireland':'🇮🇪','North Macedonia':'🇲🇰','Montenegro':'🇲🇪','Curaçao':'🇨🇼','Haiti':'🇭🇹','Guatemala':'🇬🇹','Bahrain':'🇧🇭','Oman':'🇴🇲','Kuwait':'🇰🇼','Azerbaijan':'🇦🇿','Uzbekistan':'🇺🇿','Trinidad and Tobago':'🇹🇹','Kenya':'🇰🇪','Peru':'🇵🇪','Bosnia and Herzegovina':'🇧🇦','Bosnia-Herzegovina':'🇧🇦','Cape Verde Islands':'🇨🇻','Cape Verde':'🇨🇻'};
  function fl(n){return F[n]||'🏳️';}
  function ini(n){if(!n)return'??';var p=n.trim().split(' ');return p.length===1?p[0].slice(0,2).toUpperCase():(p[0][0]+p[p.length-1][0]).toUpperCase();}
  function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},3000);}
  function fdGet(path){return fetch('/api/fd?path='+encodeURIComponent(path)).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});}

  window.addEventListener('DOMContentLoaded',function(){
    sb=window.supabase.createClient(SB_URL,SB_KEY);
    sb.auth.getSession().then(function(s){
      if(!s.data.session){window.location.href='index.html';return;}
      ME=s.data.session.user;
      sb.auth.onAuthStateChange(function(e){if(e==='SIGNED_OUT')window.location.href='index.html';});
      loadProf().then(function(){initDark();initMenu();loadData();fetchLive();setInterval(fetchLive,30000);});
    });
  });

  function loadProf(){
    return sb.from('profiles').select('*').eq('id',ME.id).single().then(function(r){
      if(r.data){PROF=r.data;return;}
      var n=(ME.user_metadata&&(ME.user_metadata.name||ME.user_metadata.full_name))||ME.email.split('@')[0];
      PROF={id:ME.id,name:n,email:ME.email,created_at:new Date().toISOString()};
      return sb.from('profiles').upsert(PROF);
    });
  }
  function initMenu(){
    var n=PROF&&PROF.name||'Usuário';
    document.getElementById('uAv').textContent=ini(n);
    document.getElementById('uNm').textContent=n;
    document.getElementById('uEm').textContent=(PROF&&PROF.email)||'';
    document.getElementById('uAv').addEventListener('click',function(e){e.stopPropagation();document.getElementById('uDd').classList.toggle('open');});
    document.addEventListener('click',function(){document.getElementById('uDd').classList.remove('open');});
  }
  function doLogout(){sb.auth.signOut().then(function(){window.location.href='index.html';});}

  function toggleDark(){applyDark(!document.body.classList.contains('dark'));}
  function applyDark(on){document.body.classList.toggle('dark',on);localStorage.setItem('bolao_dark',on);document.getElementById('dkI').textContent=on?'☀️':'🌙';document.getElementById('dkL').textContent=on?'Claro':'Escuro';}

  function swTab(id,btn){
    var par=btn.closest('.page')||document.body;
    par.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
    par.querySelectorAll('.tsec').forEach(function(s){s.classList.remove('active');});

  function togglePhase(id){
    var b=document.getElementById('pb-'+id),c=document.getElementById('pc-'+id);
    var open=b.classList.contains('open');b.classList.toggle('open',!open);c.classList.toggle('open',!open);
  }

  function loadData(){
    Promise.all([fdGet('competitions/WC/standings'),fdGet('competitions/WC/matches')]).then(function(res){
      if(res[0]&&res[0].standings)GROUPS=res[0].standings.filter(function(s){return s.type==='TOTAL';});
      if(res[1]&&res[1].matches)MATCHES=res[1].matches;
      renderGroups();renderKO();
    });
  }

  function fetchLive(){
    var today=new Date().toISOString().split('T')[0];
    fdGet('competitions/WC/matches?dateFrom='+today+'&dateTo='+today).then(function(d){
      var w=document.getElementById('liveWrap');
      if(!d||!d.matches||!d.matches.length){w.style.display='none';return;}
      w.style.display='block';
      document.getElementById('lrT').textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      var sorted=d.matches.sort(function(a,b){var o={IN_PLAY:0,PAUSED:1,FINISHED:2,SCHEDULED:3};return (o[a.status]||4)-(o[b.status]||4);});
      document.getElementById('liveBar').innerHTML=sorted.map(function(m){
        var live=m.status==='IN_PLAY'||m.status==='PAUSED',done=m.status==='FINISHED';
        var hs=m.score&&m.score.fullTime&&m.score.fullTime.home!=null?m.score.fullTime.home:null;
        var as=m.score&&m.score.fullTime&&m.score.fullTime.away!=null?m.score.fullTime.away:null;
        var time=live?(m.minute?m.minute+"'":'▶'):done?'FT':new Date(m.utcDate).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
        var hN=m.homeTeam&&(m.homeTeam.shortName||m.homeTeam.name)||'?';
        var aN=m.awayTeam&&(m.awayTeam.shortName||m.awayTeam.name)||'?';
        return '<div class="lc '+(live?'live':'')+'"><div class="ldot '+(live?'dl':done?'dff':'dsc')+'"></div><div class="lt"><div class="lr"><span class="ln">'+fl(m.homeTeam&&m.homeTeam.name)+' '+hN+'</span>'+(hs!=null?'<span class="lsc">'+hs+'</span>':'')+'</div><div class="lr"><span class="ln">'+fl(m.awayTeam&&m.awayTeam.name)+' '+aN+'</span>'+(as!=null?'<span class="lsc">'+as+'</span>':'')+'</div><div class="lmeta">'+(live?'<span class="llb">AO VIVO '+time+'</span>':time)+' · '+(m.group?m.group.replace('GROUP_',''):m.stage||'')+'</div></div></div>';
      }).join('');
    });
  }

  function renderGroups(){
    var el=document.getElementById('groupsGrid');
    if(!GROUPS.length){el.innerHTML='<div class="loading-state" style="color:var(--text-3)">Sem dados</div>';return;}
    el.innerHTML=GROUPS.map(function(g){
      var gId=g.group?g.group.replace('GROUP_',''):'?';
      return '<div class="gc"><div class="gh"><h3>Grupo '+gId+'</h3><span>'+((g.table&&g.table[0]?g.table[0].playedGames:0))+' jogos</span></div>'+
        '<table class="gt"><thead><tr><th>Time</th><th>J</th><th>SG</th><th>Pts</th></tr></thead><tbody>'+
        (g.table||[]).map(function(t,i){var sg=t.goalsFor-t.goalsAgainst;return '<tr><td><div class="tc"><div class="'+(i<2?'qd':i===2?'t3d':'ed')+'"></div><span>'+fl(t.team&&t.team.name)+'</span><span style="font-weight:'+(i<2?700:400)+'">'+((t.team&&t.team.name)||'')+'</span></div></td><td>'+t.playedGames+'</td><td>'+(sg>=0?'+'+sg:sg)+'</td><td><strong>'+t.points+'</strong></td></tr>';}).join('')+
        '</tbody></table></div>';
    }).join('');
  }

  function renderKO(){
    var el=document.getElementById('koTree');
    var ORDER=['ROUND_OF_32','ROUND_OF_16','LAST_16','QUARTER_FINALS','SEMI_FINALS','FINAL'];
    var LBL={ROUND_OF_32:'Fase 32',ROUND_OF_16:'Fase 16',LAST_16:'Oitavas',QUARTER_FINALS:'Quartas',SEMI_FINALS:'Semifinal',FINAL:'Final'};
    var by={};
    MATCHES.forEach(function(m){if(ORDER.indexOf(m.stage)>-1){if(!by[m.stage])by[m.stage]=[];by[m.stage].push(m);}});
    var stages=ORDER.filter(function(s){return by[s]&&by[s].length;});
    if(!stages.length){el.innerHTML='<div class="loading-state" style="color:var(--text-3)">Mata-mata ainda não começou</div>';return;}
    var fin=by['FINAL']&&by['FINAL'][0],champ='?';
    if(fin&&fin.status==='FINISHED'){var fh=fin.score.fullTime.home,fa=fin.score.fullTime.away,fp=fin.score.penalties;champ=fp?(fp.home>fp.away?fin.homeTeam.name:fin.awayTeam.name):(fh>fa?fin.homeTeam.name:fin.awayTeam.name);}
    var html='<div class="kot">';
    stages.forEach(function(stage){
      html+='<div class="koc"><div class="koch">'+LBL[stage]+'</div><div class="kocm">';
      by[stage].forEach(function(m){
        var live=m.status==='IN_PLAY'||m.status==='PAUSED',done=m.status==='FINISHED';
        var hs=done||live?(m.score&&m.score.fullTime&&m.score.fullTime.home!=null?m.score.fullTime.home:null):null;
        var as=done||live?(m.score&&m.score.fullTime&&m.score.fullTime.away!=null?m.score.fullTime.away:null):null;
        var pen=m.score&&m.score.penalties;
        var hW=done&&(pen?pen.home>pen.away:hs>as),aW=done&&(pen?pen.away>pen.home:as>hs);
        var hN=m.homeTeam&&m.homeTeam.name||'TBD',aN=m.awayTeam&&m.awayTeam.name||'TBD',tbd=hN==='TBD'||aN==='TBD';
        html+='<div class="km'+(stage==='FINAL'?' kfinal':'')+(live?' klive':'')+'">'+
          (live?'<div style="padding:1px 6px;background:#ef4444;text-align:center"><span style="font-size:0.57rem;color:#fff;font-weight:800">● LIVE'+(m.minute?' '+m.minute+"'":'')+'</span></div>':'')+
          '<div class="kr '+(hW?'win':done&&!hW?'lose':'')+'"><span class="kn'+(tbd?' ktbd':'')+'">'+( tbd?'?':fl(hN)+' '+hN)+'</span>'+(hs!=null?'<span class="ksc">'+hs+'</span>':'')+'</div>'+
          '<div class="kr '+(aW?'win':done&&!aW?'lose':'')+'"><span class="kn'+(tbd?' ktbd':'')+'">'+( tbd?'?':fl(aN)+' '+aN)+'</span>'+(as!=null?'<span class="ksc">'+as+'</span>':'')+'</div>'+
        '</div>';
      });
      html+='</div></div>';
    });
    html+='<div class="koc champ-col"><div class="koch">Campeão</div><div class="champ-in"><div class="champ-box"><span class="champ-tr">🏆</span><div class="champ-lbl">Campeão</div><div class="champ-nm">'+fl(champ)+' '+champ+'</div></div></div></div></div>';
    el.innerHTML=html;
  }

  /* ============================================================
     PICK'EM
     - Fase 32: pool = todos os 48 times (da API se disponível)
     - Fase 16: pool = picks da Fase 32
     - Fase 8:  pool = picks da Fase 16
     - ...
     Layout: cards em grid, igual ao print dos grupos
     Cada card = 1 slot. Arrasta o time do pool para o card.
  ============================================================ */

  var dragTeam=null,dragFromPhase=null;

  function getPool(phaseId){
    var ph=PHASES.filter(function(p){return p.id===phaseId;})[0];
    if(!ph)return[];
    if(!ph.prevPhase){
      // Fase 32: usa times reais da API se disponível, senão usa ALL48
      if(GROUPS.length){
        var pool=[];
        GROUPS.forEach(function(g){(g.table||[]).forEach(function(t){if(t.team&&t.team.name)pool.push(t.team.name);});});
        return pool.length?pool:ALL48;
      }
      return ALL48;
    }
    return picks[ph.prevPhase]||[];
  }

  // Adiciona prevPhase a cada fase
  PHASES[0].prevPhase=null;
  PHASES[1].prevPhase='F32';
  PHASES[2].prevPhase='F16';
  PHASES[3].prevPhase='F8';
  PHASES[4].prevPhase='F4';
  PHASES[5].prevPhase='F2';

  // Pega os vencedores reais de uma fase pelo API
  var API_STAGE_MAP={F32:'ROUND_OF_32',F16:'ROUND_OF_16',F8:'LAST_16',F4:'QUARTER_FINALS',F2:'SEMI_FINALS',F1:'FINAL'};
  function getRealWinners(phId){
    var stage=API_STAGE_MAP[phId];if(!stage)return[];
    var w=[];
    MATCHES.forEach(function(m){
      if(m.stage!==stage||m.status!=='FINISHED')return;
      var hs=m.score&&m.score.fullTime?m.score.fullTime.home:0;
      var as=m.score&&m.score.fullTime?m.score.fullTime.away:0;
      var pen=m.score&&m.score.penalties;
      var winner=pen?(pen.home>pen.away?m.homeTeam&&m.homeTeam.name:m.awayTeam&&m.awayTeam.name):(hs>as?m.homeTeam&&m.homeTeam.name:m.awayTeam&&m.awayTeam.name);
      if(winner)w.push(winner);
    });
    return w;
  }

  function loadPickem(){
    if(pickLoaded){renderPickem();return;}
    sb.from('user_picks').select('*').eq('user_id',ME.id).single().then(function(r){
      if(r.data&&r.data.ko_picks){
        var saved=r.data.ko_picks;
        PHASES.forEach(function(ph){if(saved[ph.id])picks[ph.id]=saved[ph.id];});
      }
      var need=!MATCHES.length?fdGet('competitions/WC/matches').then(function(d){if(d&&d.matches)MATCHES=d.matches;}):Promise.resolve();
      need.then(function(){pickLoaded=true;renderPickem();});
    });
  }

  function renderPickem(){
    var el=document.getElementById('pickPhases');
    var html='';

    PHASES.forEach(function(ph,phIdx){
      var pool=getPool(ph.id);
      var chosen=picks[ph.id]||[];
      var real=getRealWinners(ph.id);
      var phStarted=real.length>0;

      // Conta acertos/erros
      var acertos=0,erros=0;
      chosen.forEach(function(t){
        if(phStarted&&real.indexOf(t)>-1)acertos++;
        else if(real.length===ph.slots)erros++;
      });

      var summary=chosen.length+'/'+ph.slots+' escolhidos';
      if(phStarted)summary+=' · ✓'+acertos+(real.length===ph.slots?' ✗'+erros:'');
      var isOpen=phIdx===0;

      // Pool chips: times disponíveis ainda não escolhidos
      var available=pool.filter(function(t){return chosen.indexOf(t)===-1;});
      var poolHtml='';
      if(pool.length===0&&ph.prevPhase){
        poolHtml='<div class="phase-pool"><div class="phase-pool-lbl" style="color:var(--text-3);font-style:italic">Defina os palpites da fase anterior primeiro</div></div>';
      }else{
        poolHtml='<div class="phase-pool">'+
          '<div class="phase-pool-lbl">Arraste para escolher ('+available.length+' disponíveis)</div>'+
          '<div class="chip-pool">'+
          pool.map(function(t){
            var used=chosen.indexOf(t)>-1;
            return '<div class="source-chip'+(used?' used':'')+'" draggable="'+(used?'false':'true')+'" data-team="'+t+'" data-phase="'+ph.id+'" ondragstart="onSrcDragStart(event)" ondragend="onSrcDragEnd(event)">'+fl(t)+' '+t+'</div>';
          }).join('')+
          '</div></div>';
      }

      // Cards dos slots (igual ao grid de grupos do print)
      var cardsHtml='<div class="pick-grid">';
      for(var i=0;i<ph.slots;i++){
        var team=chosen[i]||null;
        var isOk=phStarted&&team&&real.indexOf(team)>-1;
        var isErr=real.length===ph.slots&&team&&real.indexOf(team)===-1;
        var posClass=i<2?'pos-1':i<4?'pos-2':i<8?'pos-3':'pos-4';
        var ptsBadge='';
        if(isOk)ptsBadge='<span class="pick-pts-badge pts-ok">+'+ph.pts+'pts</span>';
        else if(isErr)ptsBadge='<span class="pick-pts-badge pts-err">✗</span>';

        cardsHtml+='<div class="mata-pick-card">'+
          '<div class="mata-pick-head">'+
            '<span>'+ph.label+' — #'+(i+1)+'</span>'+
            (team?ptsBadge:'<span style="font-size:0.65rem;opacity:0.6">vazio</span>')+
          '</div>'+
          '<div class="mata-drop-zone" id="dz-'+ph.id+'-'+i+'" data-phase="'+ph.id+'" data-idx="'+i+'" ondragover="onDZOver(event)" ondragleave="onDZLeave(event)" ondrop="onDZDrop(event)">'+
          (team
            ? '<div class="mata-chip'+(isOk?' correct':isErr?' wrong':'')+'">'+
                '<span>'+fl(team)+' '+team+'</span>'+
                '<span class="rm" onclick="removeFromSlot(\''+ph.id+'\','+i+')">✕</span>'+
              '</div>'
            : '<span class="mata-hint">Arraste um time aqui</span>'
          )+
          '</div>'+
        '</div>';
      }
      cardsHtml+='</div>';

      // Real winners bar
      var realBar='';
      if(phStarted){
        realBar='<div style="padding:10px 14px 12px;border-top:1px solid var(--border-2);background:var(--bg-2)">'+
          '<div style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);margin-bottom:6px">'+(real.length===ph.slots?'Avançaram (real):':'Avançaram até agora:')+'</div>'+
          '<div style="display:flex;flex-wrap:wrap;gap:5px;">'+
          real.map(function(t){
            var hit=chosen.indexOf(t)>-1;
            return '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;font-size:0.73rem;font-weight:600;background:'+(hit?'var(--green-bg)':'var(--bg-3)')+';color:'+(hit?'var(--green)':'var(--text-2)')+';border:1px solid '+(hit?'rgba(22,163,74,0.3)':'var(--border)')+'">'+fl(t)+' '+t+(hit?' ✓':'')+'</span>';
          }).join('')+
          '</div></div>';
      }

      html+='<div class="phase-block">'+
        '<div class="phase-hdr" onclick="togglePhase(\''+ph.id+'\')">'+
          '<div class="phase-hdr-l"><span class="phase-icon">'+ph.icon+'</span>'+
            '<div><div class="phase-title">'+ph.label+'</div><div class="phase-sub">'+ph.desc+'</div></div>'+
          '</div>'+
          '<div class="phase-hdr-r"><span class="phase-summary">'+summary+'</span>'+
            '<span class="phase-chev'+(isOpen?' open':'')+'" id="pc-'+ph.id+'">▼</span>'+
          '</div>'+
        '</div>'+
        '<div class="phase-body'+(isOpen?' open':'')+'" id="pb-'+ph.id+'">'+
          poolHtml+cardsHtml+realBar+
        '</div>'+
      '</div>';
    });

    el.innerHTML=html;
    calcScore();
  }

  /* DRAG & DROP */
  function onSrcDragStart(e){
    dragTeam=e.currentTarget.dataset.team;
    dragFromPhase=e.currentTarget.dataset.phase;
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed='copy';
    e.dataTransfer.setData('text/plain',dragTeam);
  }
  function onSrcDragEnd(e){e.currentTarget.classList.remove('dragging');}
  function onDZOver(e){e.preventDefault();e.currentTarget.classList.add('over');}
  function onDZLeave(e){e.currentTarget.classList.remove('over');}
  function onDZDrop(e){
    e.preventDefault();
    var dz=e.currentTarget;
    dz.classList.remove('over');
    var team=dragTeam||e.dataTransfer.getData('text/plain');
    if(!team)return;
    var phId=dz.dataset.phase;
    var idx=parseInt(dz.dataset.idx);
    if(dragFromPhase&&dragFromPhase!==phId)return; // só aceita do mesmo phase pool
    addToSlot(phId,idx,team);
    dragTeam=null;dragFromPhase=null;
  }

  function addToSlot(phId,idx,team){
    var ph=PHASES.filter(function(p){return p.id===phId;})[0];
    if(!ph)return;
    if(!picks[phId])picks[phId]=[];
    // Remove de qualquer slot atual
    var existing=picks[phId].indexOf(team);
    if(existing>-1)picks[phId].splice(existing,1);
    // Expande array se necessário
    while(picks[phId].length<=idx)picks[phId].push(null);
    // Remove quem estava no slot
    picks[phId][idx]=team;
    // Limpa nulls do final
    while(picks[phId].length>0&&picks[phId][picks[phId].length-1]===null)picks[phId].pop();
    cascadeClean(phId);
    renderPickem();
  }

  function removeFromSlot(phId,idx){
    if(!picks[phId])return;
    var team=picks[phId][idx];
    if(!team)return;
    picks[phId].splice(idx,1);
    cascadeClean(phId);
    renderPickem();
  }

  function cascadeClean(fromPhId){
    var found=false;
    PHASES.forEach(function(ph){
      if(found){
        var prev=picks[ph.prevPhase]||[];
        picks[ph.id]=(picks[ph.id]||[]).filter(function(t){return t&&prev.indexOf(t)>-1;});
      }
      if(ph.id===fromPhId)found=true;
    });
  }

  function calcScore(){
    var total=0,acertos=0,erros=0,pendentes=0;
    PHASES.forEach(function(ph){
      var real=getRealWinners(ph.id);
      var chosen=picks[ph.id]||[];
      for(var i=0;i<ph.slots;i++){
        var t=chosen[i];
        if(!t){pendentes++;continue;}
        if(real.indexOf(t)>-1){total+=ph.pts;acertos++;}
        else if(real.length===ph.slots){erros++;}
        else{pendentes++;}
      }
    });
    document.getElementById('ptT').textContent=total;
    document.getElementById('ptA').textContent=acertos;
    document.getElementById('ptE').textContent=erros;
    document.getElementById('ptP').textContent=pendentes;
    if(ME)sb.from('profiles').update({score:total,correct_picks:acertos}).eq('id',ME.id);
  }

  function saveAllPicks(){
    if(!ME){toast('Faça login primeiro.');return;}
    var toSave={};
    PHASES.forEach(function(ph){toSave[ph.id]=picks[ph.id]||[];});
    sb.from('user_picks').upsert({user_id:ME.id,group_picks:{},ko_picks:toSave,updated_at:new Date().toISOString()},{onConflict:'user_id'}).then(function(r){
      if(r.error){toast('Erro: '+r.error.message);return;}
      toast('Palpites salvos! 💾');
    });
  }

  function loadRanking(){
    var el=document.getElementById('rankList');
    el.innerHTML='<div class="loading-state"><div class="spinner"></div></div>';
    sb.from('profiles').select('id,name,email,score,correct_picks').order('score',{ascending:false}).limit(50).then(function(r){
      if(r.error||!r.data||!r.data.length){renderRankFallback(el);return;}
      renderRank(el,r.data);
    });
  }
  function renderRank(el,users){
    var medals=['🥇','🥈','🥉'];
    el.innerHTML='<div class="ranking-card">'+users.map(function(u,i){
      var isMe=ME&&u.id===ME.id;
      return '<div class="ranking-row'+(isMe?' is-me':'')+'"><div class="rank-pos">'+(medals[i]||i+1)+'</div><div class="rank-avatar">'+ini(u.name||u.email||'?')+'</div><div class="rank-info"><div class="rank-name">'+(u.name||(u.email&&u.email.split('@')[0])||'?')+(isMe?'<span class="rank-you">Você</span>':'')+'</div><div class="rank-sub">'+(u.correct_picks||0)+' acertos</div></div><div class="rank-pts">'+(u.score||0)+'<span class="rank-pts-label">pts</span></div></div>';
    }).join('')+'</div>';
  }
  function renderRankFallback(el){renderRank(el,[{id:'1',name:'Pedro Alves',score:200,correct_picks:15,email:'p@p.com'},{id:'2',name:'Maria Costa',score:160,correct_picks:12,email:'m@m.com'},{id:'3',name:'João Silva',score:130,correct_picks:10,email:'j@j.com'}]);}
  </script>
