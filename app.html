<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolão Copa 2026 — App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-brand">
      <span class="topbar-trophy" aria-hidden="true">🏆</span>
      <span class="topbar-title">Bolão Copa <strong>2026</strong></span>
    </div>
    <div class="topbar-actions">
      <button class="btn-dark-toggle" id="darkToggle" onclick="toggleDarkMode()" aria-label="Alternar modo escuro">
        <span id="darkIcon">🌙</span>
        <span id="darkLabel">Escuro</span>
      </button>
      <div class="user-menu" id="userMenu">
        <div class="user-avatar" id="userAvatar">--</div>
        <div class="user-dropdown" id="userDropdown">
          <div class="user-info">
            <strong id="dropdownName">Usuário</strong>
            <small id="dropdownEmail">email@email.com</small>
          </div>
          <hr>
          <button onclick="doLogout()">Sair</button>
        </div>
      </div>
    </div>
  </header>

  <!-- NAV -->
  <nav class="nav-tabs" role="tablist">
    <button class="nav-tab active" role="tab" data-page="brackets" onclick="switchPage('brackets', this)">
      <span class="nav-icon">🗂</span><span>Chaveamento</span>
    </button>
    <button class="nav-tab" role="tab" data-page="pickem" onclick="switchPage('pickem', this)">
      <span class="nav-icon">🎯</span><span>Meus Palpites</span>
    </button>
    <button class="nav-tab" role="tab" data-page="ranking" onclick="switchPage('ranking', this)">
      <span class="nav-icon">🏅</span><span>Ranking</span>
    </button>
  </nav>

  <!-- PAGES -->
  <main class="app-main">

    <!-- ===== BRACKETS ===== -->
    <section class="page active" id="page-brackets" role="tabpanel">
      <div class="page-header">
        <h2>Copa do Mundo <span class="gold">2026</span></h2>
        <div class="live-pill">
          <span class="live-dot" aria-hidden="true"></span>
          Dados em tempo real
        </div>
      </div>

      <!-- GROUPS SECTION -->
      <div class="section-label">Fase de Grupos</div>
      <div id="groupsGrid" class="groups-grid">
        <div class="loading-state">
          <div class="spinner"></div>
          Carregando grupos...
        </div>
      </div>

      <!-- KNOCKOUT SECTION -->
      <div class="section-label" style="margin-top:2rem">Mata-Mata</div>
      <div id="knockoutTree" class="knockout-wrapper">
        <div class="loading-state">
          <div class="spinner"></div>
          Carregando chaveamento...
        </div>
      </div>
    </section>

    <!-- ===== PICK'EM ===== -->
    <section class="page" id="page-pickem" role="tabpanel">
      <div class="page-header">
        <h2>🎯 Meus Palpites</h2>
        <button class="btn-save-all" onclick="saveAllPicks()">
          💾 Salvar tudo
        </button>
      </div>

      <!-- SCORE BANNER -->
      <div class="score-banner">
        <div class="score-stat">
          <div class="score-val gold" id="statPts">0</div>
          <div class="score-lbl">Pontos</div>
        </div>
        <div class="score-stat">
          <div class="score-val green" id="statCorrect">0</div>
          <div class="score-lbl">Acertos</div>
        </div>
        <div class="score-stat">
          <div class="score-val red" id="statWrong">0</div>
          <div class="score-lbl">Erros</div>
        </div>
        <div class="score-stat">
          <div class="score-val muted" id="statPending">0</div>
          <div class="score-lbl">Pendentes</div>
        </div>
      </div>

      <div id="pickemGrid" class="pickem-grid">
        <div class="loading-state">
          <div class="spinner"></div>
          Carregando jogos...
        </div>
      </div>
    </section>

    <!-- ===== RANKING ===== -->
    <section class="page" id="page-ranking" role="tabpanel">
      <div class="page-header">
        <h2>🏅 Ranking Geral</h2>
        <button class="btn-outline-sm" onclick="loadRanking()">↻ Atualizar</button>
      </div>
      <div id="rankingList">
        <div class="loading-state">
          <div class="spinner"></div>
          Carregando ranking...
        </div>
      </div>
    </section>

  </main>

  <!-- TOAST -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/brackets.js"></script>
  <script src="js/pickem.js"></script>
  <script src="js/ranking.js"></script>
</body>
</html>
