<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bol├гo Copa 2026</title>

  <link rel="stylesheet" href="css/app.css">

    .live-bar::-webkit-scrollbar{display:none}
    .lc{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;min-width:170px;display:flex;align-items:center;gap:8px;}
    .lc.live{border-color:#ef4444;box-shadow:0 0 8px rgba(239,68,68,0.12);}
    .lt{flex:1;display:flex;flex-direction:column;gap:3px;}
    .lr{display:flex;align-items:center;justify-content:space-between;gap:6px;}
    .ln{font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:105px;font-size:0.78rem;}
    .ls{font-weight:800;font-size:0.88rem;color:var(--gold);}
    .lm{font-size:0.64rem;color:var(--text-3);margin-top:2px;}
    .lb{display:inline-flex;align-items:center;gap:3px;background:rgba(239,68,68,0.15);color:#ef4444;font-size:0.6rem;font-weight:800;padding:1px 5px;border-radius:99px;}
    .lb::before{content:'';width:4px;height:4px;border-radius:50%;background:#ef4444;animation:livePulse 1s infinite;}
    .ld{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
    .dl{background:#ef4444;animation:livePulse 1s infinite;}
    .df{background:var(--green);}
    .ds2{background:var(--text-3);}
    .ri{display:flex;align-items:center;gap:8px;font-size:0.7rem;color:var(--text-3);padding:3px 1.25rem 5px;}
    .rb2{background:none;border:none;color:var(--gold);font-size:0.7rem;cursor:pointer;font-family:inherit;}
    .tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
    .tab{padding:6px 14px;background:var(--bg-3);border:1px solid var(--border);border-radius:99px;font-size:0.78rem;font-weight:600;color:var(--text-2);cursor:pointer;transition:all 0.2s;}
    .tab.active{background:var(--gold);color:#0D0D1A;border-color:var(--gold);}
    .tsec{display:none;}
    .tsec.active{display:block;}
    .gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:0.8rem;}
    .gc{border-radius:12px;overflow:hidden;background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow-sm);}
    .gh{background:var(--gold);color:#0D0D1A;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
    .gh h3{font-size:0.85rem;font-weight:800;}
    .gh span{font-size:0.68rem;opacity:0.65;}
    .gt{width:100%;border-collapse:collapse;}
    .gt th{font-size:0.62rem;font-weight:700;text-transform:uppercase;color:var(--text-3);padding:5px 12px 4px;text-align:left;border-bottom:1px solid var(--border-2);}
    .gt th:not(:first-child){text-align:center;}
    .gt td{padding:6px 12px;font-size:0.77rem;border-bottom:1px solid var(--border-2);color:var(--text);}
    .gt td:not(:first-child){text-align:center;color:var(--text-2);font-size:0.74rem;}
    .gt tr:last-child td{border-bottom:none;}
    .tc{display:flex;align-items:center;gap:5px;}
    .qd{width:4px;height:4px;border-radius:50%;background:var(--green);flex-shrink:0;}
    .t3d{width:4px;height:4px;border-radius:50%;background:var(--gold);flex-shrink:0;}
    .ed{width:4px;height:4px;flex-shrink:0;}
    .kow{overflow-x:auto;padding-bottom:1rem;}
    .kot{display:flex;align-items:stretch;min-width:860px;}
    .koc{display:flex;flex-direction:column;border-right:1px solid var(--border-2);flex:1;}
    .koc:last-child{border-right:none;}
    .koch{text-align:center;font-size:0.63rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--gold);padding:9px 4px 7px;border-bottom:1px solid var(--border);background:var(--bg-3);}
    .kocm{display:flex;flex-direction:column;justify-content:space-around;flex:1;padding:5px 3px;gap:4px;}
    .km{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;min-width:100px;}
    .km.klive{border-color:#ef4444;}
    .km.kfinal{border-color:var(--gold);box-shadow:0 0 16px rgba(212,175,55,0.2);}
    .kr{display:flex;align-items:center;justify-content:space-between;padding:5px 7px;font-size:0.7rem;font-weight:500;min-height:26px;gap:3px;}
    .kr:first-child{border-bottom:1px solid var(--border-2);}
    .kr.win{background:rgba(212,175,55,0.1);font-weight:700;}
    .kr.lose{opacity:0.4;}
    .kn{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;}
    .ktbd{color:var(--text-3);font-style:italic;font-size:0.68rem;}
    .ksc{font-weight:800;font-size:0.78rem;color:var(--gold);}
    .champ-col{display:flex;flex-direction:column;min-width:100px;}
    .champ-in{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 5px;}
    .champ-box{background:var(--card);border:2px solid var(--gold);border-radius:12px;padding:1rem 0.6rem;text-align:center;width:100%;box-shadow:0 0 28px rgba(212,175,55,0.22);}
    .champ-tr{font-size:1.8rem;display:block;margin-bottom:4px;}
    .champ-lbl{font-size:0.58rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--gold);}
    .champ-nm{font-size:0.82rem;font-weight:800;color:var(--text);margin-top:4px;}

    /* PICK'EM */
    .pts-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;}
    .pts-c{flex:1;min-width:75px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;box-shadow:var(--shadow-sm);}
    .pts-v{font-size:1.5rem;font-weight:900;line-height:1;}
    .pts-l{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);margin-top:3px;font-weight:600;}

    /* Phase blocks with collapse */
    .phase-block{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm);margin-bottom:0.75rem;}
    .phase-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none;transition:background 0.15s;}
    .phase-hdr:hover{background:var(--bg-3);}
    .phase-hdr-l{display:flex;align-items:center;gap:10px;}
    .phase-icon{font-size:1.1rem;}
    .phase-title{font-size:0.9rem;font-weight:700;color:var(--text);}
    .phase-sub{font-size:0.72rem;color:var(--text-3);}
    .phase-hdr-r{display:flex;align-items:center;gap:10px;}
    .phase-summary{font-size:0.75rem;font-weight:600;color:var(--gold);}
    .phase-chev{font-size:0.75rem;color:var(--text-3);transition:transform 0.2s;display:inline-block;}
    .phase-chev.open{transform:rotate(180deg);}
    .phase-body{display:none;border-top:1px solid var(--border);}
    .phase-body.open{display:block;}

    /* Pick row inside phase */
    .pick-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border-2);gap:12px;flex-wrap:wrap;}
    .pick-row:last-child{border-bottom:none;}
    .pick-sel{padding:8px 12px;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.82rem;font-family:inherit;outline:none;cursor:pointer;flex:1;min-width:180px;max-width:280px;}
    .pick-sel:focus{border-color:var(--gold);}
    .pick-sel option{background:var(--bg-2);}
    .pick-result-badge{font-size:0.75rem;font-weight:700;padding:4px 12px;border-radius:99px;white-space:nowrap;}
    .prb-ok{background:var(--green-bg);color:var(--green);}
    .prb-err{background:var(--red-bg);color:var(--red);}
    .prb-wait{background:var(--gold-bg);color:var(--gold-dark);}
    .prb-saved{background:var(--bg-3);color:var(--text-2);border:1px solid var(--border);}
    .real-winner{font-size:0.78rem;color:var(--text-3);white-space:nowrap;}

    @media(max-width:640px){.gg{grid-template-columns:1fr;}.kot{min-width:650px;}.pick-row{flex-direction:column;align-items:flex-start;}}
  </style>
</head>
<body>

  <main class="app-main">
    <!-- CHAVEAMENTO -->
    <section class="page active" id="page-brackets">
      <div class="page-header">

        <button class="tab active" onclick="swTab('tGrp',this)">ЁЯУК Grupos</button>

  </main>

    document.getElementById('page-'+id).classList.add('active');
    if(id==='pickem')loadPickem();
    if(id==='ranking')loadRanking();
  }
  function swTab(id,btn){
    var par=btn.closest('.page')||document.body;
    par.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
    par.querySelectorAll('.tsec').forEach(function(s){s.classList.remove('active');});
    btn.classList.add('active');
    document.getElementById(id).classList.add('active');
  }
  function togglePhase(id){
    var b=document.getElementById('pb-'+id);
    var c=document.getElementById('pc-'+id);
    var open=b.classList.contains('open');
    b.classList.toggle('open',!open);
    c.classList.toggle('open',!open);
  }

  function loadData(){
    Promise.all([fdGet('competitions/WC/standings'),fdGet('competitions/WC/matches')]).then(function(res){
      if(res[0]&&res[0].standings)GROUPS=res[0].standings.filter(function(s){return s.type==='TOTAL';});
      if(res[1]&&res[1].matches)MATCHES=res[1].matches;
      renderGroups();renderKO();
    });
  }

  function fetchLive(){
    var today=new Date().toISOString().split('T')[0];
    fdGet('competitions/WC/matches?dateFrom='+today+'&dateTo='+today).then(function(d){
      var w=document.getElementById('liveWrap');
      if(!d||!d.matches||!d.matches.length){w.style.display='none';return;}
      w.style.display='block';
      document.getElementById('lrT').textContent='Atualizado ├аs '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      var bar=document.getElementById('liveBar');
      var sorted=d.matches.sort(function(a,b){var o={IN_PLAY:0,PAUSED:1,FINISHED:2,SCHEDULED:3};return (o[a.status]||4)-(o[b.status]||4);});
      bar.innerHTML=sorted.map(function(m){
        var live=m.status==='IN_PLAY'||m.status==='PAUSED';
        var done=m.status==='FINISHED';
        var hs=m.score&&m.score.fullTime&&m.score.fullTime.home!=null?m.score.fullTime.home:null;
        var as=m.score&&m.score.fullTime&&m.score.fullTime.away!=null?m.score.fullTime.away:null;
        var dc=live?'dl':done?'df':'ds2';
        var time=live?(m.minute?m.minute+"'":'тЦ╢'):done?'FT':new Date(m.utcDate).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
        var hN=m.homeTeam&&(m.homeTeam.shortName||m.homeTeam.name)||'?';
        var aN=m.awayTeam&&(m.awayTeam.shortName||m.awayTeam.name)||'?';
        return '<div class="lc '+(live?'live':'')+'"><div class="ld '+dc+'"></div><div class="lt"><div class="lr"><span class="ln">'+fl(m.homeTeam&&m.homeTeam.name)+' '+hN+'</span>'+(hs!=null?'<span class="ls">'+hs+'</span>':'')+'</div><div class="lr"><span class="ln">'+fl(m.awayTeam&&m.awayTeam.name)+' '+aN+'</span>'+(as!=null?'<span class="ls">'+as+'</span>':'')+'</div><div class="lm">'+(live?'<span class="lb">AO VIVO '+time+'</span>':time)+' ┬╖ '+(m.group?m.group.replace('GROUP_',''):m.stage||'')+'</div></div></div>';
      }).join('');
    });
  }

  function renderGroups(){
    var el=document.getElementById('groupsGrid');
    if(!GROUPS.length){el.innerHTML='<div class="loading-state" style="color:var(--text-3)">Sem dados</div>';return;}
    el.innerHTML=GROUPS.map(function(g){
      var gId=g.group?g.group.replace('GROUP_',''):'?';
      return '<div class="gc"><div class="gh"><h3>Grupo '+gId+'</h3><span>'+((g.table&&g.table[0]?g.table[0].playedGames:0))+' jogos</span></div>'+
        '<table class="gt"><thead><tr><th>Time</th><th>J</th><th>SG</th><th>Pts</th></tr></thead><tbody>'+
        (g.table||[]).map(function(t,i){
          var sg=t.goalsFor-t.goalsAgainst;
          return '<tr><td><div class="tc"><div class="'+(i<2?'qd':i===2?'t3d':'ed')+'"></div><span>'+fl(t.team&&t.team.name)+'</span><span style="font-weight:'+(i<2?700:400)+'">'+((t.team&&t.team.name)||'')+'</span></div></td><td>'+t.playedGames+'</td><td>'+(sg>=0?'+'+sg:sg)+'</td><td><strong>'+t.points+'</strong></td></tr>';
        }).join('')+'</tbody></table></div>';
    }).join('');
  }

  function renderKO(){
    var el=document.getElementById('koTree');
    var ORDER=['ROUND_OF_32','ROUND_OF_16','LAST_16','QUARTER_FINALS','SEMI_FINALS','FINAL'];
    var LBL={ROUND_OF_32:'Fase 32',ROUND_OF_16:'Fase 16',LAST_16:'Oitavas',QUARTER_FINALS:'Quartas',SEMI_FINALS:'Semifinal',FINAL:'Final'};
    var by={};
    MATCHES.forEach(function(m){if(ORDER.indexOf(m.stage)>-1){if(!by[m.stage])by[m.stage]=[];by[m.stage].push(m);}});
    var stages=ORDER.filter(function(s){return by[s]&&by[s].length;});
    if(!stages.length){el.innerHTML='<div class="loading-state" style="color:var(--text-3)">Mata-mata ainda n├гo come├зou</div>';return;}
    var fin=by['FINAL']&&by['FINAL'][0];var champ='?';
    if(fin&&fin.status==='FINISHED'){var fh=fin.score.fullTime.home,fa=fin.score.fullTime.away,fp=fin.score.penalties;champ=fp?(fp.home>fp.away?fin.homeTeam.name:fin.awayTeam.name):(fh>fa?fin.homeTeam.name:fin.awayTeam.name);}
    var html='<div class="kot">';
    stages.forEach(function(stage){
      html+='<div class="koc"><div class="koch">'+LBL[stage]+'</div><div class="kocm">';
      by[stage].forEach(function(m){
        var live=m.status==='IN_PLAY'||m.status==='PAUSED',done=m.status==='FINISHED';
        var hs=done||live?(m.score&&m.score.fullTime&&m.score.fullTime.home!=null?m.score.fullTime.home:null):null;
        var as=done||live?(m.score&&m.score.fullTime&&m.score.fullTime.away!=null?m.score.fullTime.away:null):null;
        var pen=m.score&&m.score.penalties;
        var hW=done&&(pen?pen.home>pen.away:hs>as),aW=done&&(pen?pen.away>pen.home:as>hs);
        var hN=m.homeTeam&&m.homeTeam.name||'TBD',aN=m.awayTeam&&m.awayTeam.name||'TBD',tbd=hN==='TBD'||aN==='TBD';
        html+='<div class="km'+(stage==='FINAL'?' kfinal':'')+(live?' klive':'')+'">'+
          (live?'<div style="padding:1px 6px;background:#ef4444;text-align:center"><span style="font-size:0.57rem;color:#fff;font-weight:800">тЧП LIVE'+(m.minute?' '+m.minute+"'":'')+'</span></div>':'')+
          '<div class="kr '+(hW?'win':done&&!hW?'lose':'')+'"><span class="kn'+(tbd?' ktbd':'')+'">'+( tbd?'?':fl(hN)+' '+hN)+'</span>'+(hs!=null?'<span class="ksc">'+hs+(pen?'('+pen.home+'p)':'')+'</span>':'')+'</div>'+
          '<div class="kr '+(aW?'win':done&&!aW?'lose':'')+'"><span class="kn'+(tbd?' ktbd':'')+'">'+( tbd?'?':fl(aN)+' '+aN)+'</span>'+(as!=null?'<span class="ksc">'+as+(pen?'('+pen.away+'p)':'')+'</span>':'')+'</div>'+
        '</div>';
      });
      html+='</div></div>';
    });
    html+='<div class="koc champ-col"><div class="koch">Campe├гo</div><div class="champ-in"><div class="champ-box"><span class="champ-tr">ЁЯПЖ</span><div class="champ-lbl">Campe├гo</div><div class="champ-nm">'+fl(champ)+' '+champ+'</div></div></div></div></div>';
    el.innerHTML=html;
  }

  // ===================== PICK'EM =====================
  // PICKS = { 'F32_0': 'Brazil', 'F32_1': 'France', ..., 'F1_0': 'Argentina' }
  // Cada fase tem N slots = N times que o usu├бrio acha que v├гo avan├зar

  function loadPickem(){
    if(pickLoaded){renderPickem();return;}
    sb.from('user_picks').select('*').eq('user_id',ME.id).single().then(function(r){
      if(r.data&&r.data.ko_picks)PICKS=r.data.ko_picks;
      if(!MATCHES.length){
        fdGet('competitions/WC/matches').then(function(d){
          if(d&&d.matches)MATCHES=d.matches;
          pickLoaded=true;renderPickem();
        });
      }else{pickLoaded=true;renderPickem();}
    });
  }

  // Pega os times que REALMENTE avan├зaram em cada fase, pela API
  function getRealAdvancers(apiStage){
    // Times que venceram jogos desta fase
    var winners=[];
    MATCHES.forEach(function(m){
      if(m.stage!==apiStage||m.status!=='FINISHED')return;
      var hs=m.score&&m.score.fullTime?m.score.fullTime.home:0;
      var as=m.score&&m.score.fullTime?m.score.fullTime.away:0;
      var pen=m.score&&m.score.penalties;
      var w=pen?(pen.home>pen.away?m.homeTeam&&m.homeTeam.name:m.awayTeam&&m.awayTeam.name):(hs>as?m.homeTeam&&m.homeTeam.name:m.awayTeam&&m.awayTeam.name);
      if(w)winners.push(w);
    });
    return winners;
  }

  function renderPickem(){
    var el=document.getElementById('pickPhases');
    var html='';

    PHASES.forEach(function(phase,phIdx){
      var realAdvancers=getRealAdvancers(phase.apiStage);
      var phaseFinished=realAdvancers.length===phase.slots;
      var phaseStarted=realAdvancers.length>0;

      // Palpites do usu├бrio para esta fase
      var userPicks=[];
      for(var i=0;i<phase.slots;i++){
        var key=phase.id+'_'+i;
        if(PICKS[key])userPicks.push(PICKS[key]);
      }

      // Calcula acertos
      var acertos=0,erros=0;
      if(phaseStarted){
        userPicks.forEach(function(pick){
          if(realAdvancers.indexOf(pick)>-1)acertos++;
          else if(phaseFinished)erros++;
        });
      }

      var summary=userPicks.length>0?(userPicks.length+'/'+phase.slots+' escolhidos'):'Nenhum palpite';
      if(phaseStarted)summary+=' ┬╖ '+acertos+' acerto(s)';
      var isOpen=phIdx===0;

      // Dropdown options: todos os 48 times
      var opts='<option value="">тАФ Escolha um time тАФ</option>';
      ALL_TEAMS.forEach(function(t){opts+='<option value="'+t+'">'+fl(t)+' '+t+'</option>';});

      // Rows: N slots
      var rows='';
      for(var j=0;j<phase.slots;j++){
        var key2=phase.id+'_'+j;
        var pick=PICKS[key2]||'';
        var isCorrect=phaseStarted&&pick&&realAdvancers.indexOf(pick)>-1;
        var isWrong=phaseFinished&&pick&&realAdvancers.indexOf(pick)===-1;
        var isPending=!phaseStarted||!pick;

        var badge='';
        if(isCorrect)badge='<span class="pick-result-badge prb-ok">тЬУ +'+phase.pts+'pts</span>';
        else if(isWrong)badge='<span class="pick-result-badge prb-err">тЬЧ Errou</span>';
        else if(pick)badge='<span class="pick-result-badge prb-saved">ЁЯТ╛ Salvo</span>';

        // Select com valor atual
        var selOpts='<option value="">тАФ Escolha um time тАФ</option>';
        ALL_TEAMS.forEach(function(t){selOpts+='<option value="'+t+'" '+(pick===t?'selected':'')+'>'+fl(t)+' '+t+'</option>';});

        rows+='<div class="pick-row">'+
          '<span style="font-size:0.75rem;font-weight:700;color:var(--text-3);min-width:28px;">'+(j+1)+'┬║</span>'+
          '<select class="pick-sel" onchange="setPick(\''+key2+'\',this.value)">'+selOpts+'</select>'+
          badge+
        '</div>';
      }

      // Se a fase j├б terminou, mostra quem realmente avan├зou
      var realHtml='';
      if(phaseStarted){
        realHtml='<div style="padding:10px 16px 12px;border-top:1px solid var(--border-2);background:var(--bg-3)">'+
          '<div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);margin-bottom:8px">'+
          (phaseFinished?'тЬУ Times que avan├зaram (resultado real):':'тП│ Avan├зaram at├й agora:')+
          '</div>'+
          '<div style="display:flex;flex-wrap:wrap;gap:6px;">'+
          realAdvancers.map(function(t){
            var userPicked=userPicks.indexOf(t)>-1;
            return '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:0.75rem;font-weight:600;background:'+(userPicked?'var(--green-bg)':'var(--bg-2)')+';color:'+(userPicked?'var(--green)':'var(--text-2)')+';border:1px solid '+(userPicked?'rgba(22,163,74,0.3)':'var(--border)')+'">'+fl(t)+' '+t+(userPicked?' тЬУ':'')+'</span>';
          }).join('')+
          '</div></div>';
      }

      html+='<div class="phase-block">'+
        '<div class="phase-hdr" onclick="togglePhase(\''+phase.id+'\')">'+
          '<div class="phase-hdr-l">'+
            '<span class="phase-icon">'+phase.icon+'</span>'+
            '<div><div class="phase-title">'+phase.label+'</div><div class="phase-sub">'+phase.desc+'</div></div>'+
          '</div>'+
          '<div class="phase-hdr-r">'+
            '<span class="phase-summary">'+summary+'</span>'+
            '<span class="phase-chev'+(isOpen?' open':'')+'" id="pc-'+phase.id+'">тЦ╝</span>'+
          '</div>'+
        '</div>'+
        '<div class="phase-body'+(isOpen?' open':'')+'" id="pb-'+phase.id+'">'+
          rows+
          realHtml+
        '</div>'+
      '</div>';
    });

    el.innerHTML=html;
    calcTotalScore();
  }

  function setPick(key,val){
    if(val)PICKS[key]=val;
    else delete PICKS[key];
    calcTotalScore();
    // Atualiza s├│ o badge desta linha sem re-renderizar tudo
    updateBadge(key,val);
  }

  function updateBadge(key,val){
    // Acha a fase deste pick
    var phaseId=key.split('_')[0];
    var phase=PHASES.filter(function(p){return p.id===phaseId;})[0];
    if(!phase)return;
    var realAdvancers=getRealAdvancers(phase.apiStage);
    var phaseFinished=realAdvancers.length===phase.slots;
    var phaseStarted=realAdvancers.length>0;
    // Atualiza o select e badge da linha
    var sel=document.querySelector('select[onchange*="\''+key+'\'"]');
    if(sel)sel.value=val||'';
  }

  function calcTotalScore(){
    var total=0,acertos=0,erros=0,pendentes=0;
    PHASES.forEach(function(phase){
      var realAdvancers=getRealAdvancers(phase.apiStage);
      var phaseFinished=realAdvancers.length===phase.slots;
      var phaseStarted=realAdvancers.length>0;
      for(var i=0;i<phase.slots;i++){
        var pick=PICKS[phase.id+'_'+i];
        if(!pick){pendentes++;continue;}
        if(phaseStarted&&realAdvancers.indexOf(pick)>-1){total+=phase.pts;acertos++;}
        else if(phaseFinished){erros++;}
        else{pendentes++;}
      }
    });
    document.getElementById('ptT').textContent=total;
    document.getElementById('ptA').textContent=acertos;
    document.getElementById('ptE').textContent=erros;
    document.getElementById('ptP').textContent=pendentes;
    if(ME)sb.from('profiles').update({score:total,correct_picks:acertos}).eq('id',ME.id);
  }

  function saveAllPicks(){
    if(!ME){toast('Fa├зa login primeiro.');return;}
    sb.from('user_picks').upsert({
      user_id:ME.id,
      group_picks:{},
      ko_picks:PICKS,
      updated_at:new Date().toISOString()
    },{onConflict:'user_id'}).then(function(r){
      if(r.error){toast('Erro: '+r.error.message);return;}
      toast('Palpites salvos! ЁЯТ╛');
    });
  }

  // RANKING
  function loadRanking(){
    var el=document.getElementById('rankList');
    el.innerHTML='<div class="loading-state"><div class="spinner"></div></div>';
    sb.from('profiles').select('id,name,email,score,correct_picks').order('score',{ascending:false}).limit(50).then(function(r){
      if(r.error||!r.data||!r.data.length){renderRankFallback(el);return;}
      renderRank(el,r.data);
    });
  }
  function renderRank(el,users){
    var medals=['ЁЯеЗ','ЁЯеИ','ЁЯеЙ'];
    el.innerHTML='<div class="ranking-card">'+users.map(function(u,i){
      var isMe=ME&&u.id===ME.id;
      return '<div class="ranking-row'+(isMe?' is-me':'')+'"><div class="rank-pos">'+(medals[i]||i+1)+'</div><div class="rank-avatar">'+ini(u.name||u.email||'?')+'</div><div class="rank-info"><div class="rank-name">'+(u.name||(u.email&&u.email.split('@')[0])||'?')+(isMe?'<span class="rank-you">Voc├к</span>':'')+'</div><div class="rank-sub">'+(u.correct_picks||0)+' acertos</div></div><div class="rank-pts">'+(u.score||0)+'<span class="rank-pts-label">pts</span></div></div>';
    }).join('')+'</div>';
  }
  function renderRankFallback(el){renderRank(el,[{id:'1',name:'Pedro Alves',score:120,correct_picks:8,email:'p@p.com'},{id:'2',name:'Maria Costa',score:95,correct_picks:6,email:'m@m.com'},{id:'3',name:'Jo├гo Silva',score:70,correct_picks:5,email:'j@j.com'}]);}
  </script>
