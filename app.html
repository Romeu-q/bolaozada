<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BolГЈo Copa 2026 вҖ” App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-brand">
      <span class="topbar-trophy" aria-hidden="true">рҹҸҶ</span>
      <span class="topbar-title">BolГЈo Copa <strong>2026</strong></span>
    </div>
    <div class="topbar-actions">
      <button class="btn-dark-toggle" id="darkToggle" onclick="toggleDarkMode()" aria-label="Alternar modo escuro">
        <span id="darkIcon">рҹҢҷ</span>
        <span id="darkLabel">Escuro</span>
      </button>
      <div class="user-menu" id="userMenu">
        <div class="user-avatar" id="userAvatar">--</div>
        <div class="user-dropdown" id="userDropdown">
          <div class="user-info">
            <strong id="dropdownName">UsuГЎrio</strong>
            <small id="dropdownEmail">email@email.com</small>
          </div>
          <hr>
          <button onclick="doLogout()">Sair</button>
        </div>
      </div>
    </div>
  </header>

  <!-- NAV -->
  <nav class="nav-tabs" role="tablist">
    <button class="nav-tab active" role="tab" data-page="brackets" onclick="switchPage('brackets', this)">
      <span class="nav-icon">рҹ—Ӯ</span><span>Chaveamento</span>
    </button>
    <button class="nav-tab" role="tab" data-page="pickem" onclick="switchPage('pickem', this)">
      <span class="nav-icon">рҹҺҜ</span><span>Meus Palpites</span>
    </button>
    <button class="nav-tab" role="tab" data-page="ranking" onclick="switchPage('ranking', this)">
      <span class="nav-icon">рҹҸ…</span><span>Ranking</span>
    </button>
  </nav>

  <!-- PAGES -->
  <main class="app-main">

    <!-- ===== BRACKETS ===== -->
    <section class="page active" id="page-brackets" role="tabpanel">
      <div class="page-header">
        <h2>Copa do Mundo <span class="gold">2026</span></h2>
        <div class="live-pill">
          <span class="live-dot" aria-hidden="true"></span>
          Dados em tempo real
        </div>
      </div>

      <!-- GROUPS SECTION -->
      <div class="section-label">Fase de Grupos</div>
      <div id="groupsGrid" class="groups-grid">
        <div class="loading-state">
          <div class="spinner"></div>
          Carregando grupos...
        </div>
      </div>

      <!-- KNOCKOUT SECTION -->
      <div class="section-label" style="margin-top:2rem">Mata-Mata</div>
      <div id="knockoutTree" class="knockout-wrapper">
        <div class="loading-state">
          <div class="spinner"></div>
          Carregando chaveamento...
        </div>
      </div>
    </section>

    <!-- ===== PICK'EM ===== -->
    <section class="page" id="page-pickem" role="tabpanel">
      <div class="page-header">
        <h2>рҹҺҜ Meus Palpites</h2>
        <button class="btn-save-all" onclick="saveAllPicks()">
          рҹ’ҫ Salvar tudo
        </button>
      </div>

      <!-- SCORE BANNER -->
      <div class="score-banner">
        <div class="score-stat">
          <div class="score-val gold" id="statPts">0</div>
          <div class="score-lbl">Pontos</div>
        </div>
        <div class="score-stat">
          <div class="score-val green" id="statCorrect">0</div>
          <div class="score-lbl">Acertos</div>
        </div>
        <div class="score-stat">
          <div class="score-val red" id="statWrong">0</div>
          <div class="score-lbl">Erros</div>
        </div>
        <div class="score-stat">
          <div class="score-val muted" id="statPending">0</div>
          <div class="score-lbl">Pendentes</div>
        </div>
      </div>

      <div id="pickemGrid" class="pickem-grid">
        <div class="loading-state">
          <div class="spinner"></div>
          Carregando jogos...
        </div>
      </div>
    </section>

    <!-- ===== RANKING ===== -->
    <section class="page" id="page-ranking" role="tabpanel">
      <div class="page-header">
        <h2>рҹҸ… Ranking Geral</h2>
        <button class="btn-outline-sm" onclick="loadRanking()">вҶ» Atualizar</button>
      </div>
      <div id="rankingList">
        <div class="loading-state">
          <div class="spinner"></div>
          Carregando ranking...
        </div>
      </div>
    </section>

  </main>

 <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <script>
    // Config inline вҖ” sem depender de config.js externo
    const SUPABASE_URL = 'https://olzcsczypoaqpntzfbsv.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_GD9R_nDQNxlZY5F0lNaCnw_CUAKm6eX';
    const FD_BASE = 'https://api.football-data.org/v4';

    const WC_COMPETITION_ID = 2000;

    let supabase;
    let currentUser = null;
    let currentProfile = null;

    const _cache = {};
    async function cachedFD(path, ttlMs = 5 * 60 * 1000) {
      const key = 'fd:' + path;
      const now = Date.now();
      if (_cache[key] && now - _cache[key].ts < ttlMs) return _cache[key].data;
      const data = await apiFD(path);
      if (data) _cache[key] = { data, ts: now };
      return data;
    }

    async function apiFD(path) {
      try {
        const res = await fetch(FD_BASE + path, { headers: { 'X-Auth-Token': FD_TOKEN } });
        if (!res.ok) return null;
        return res.json();
      } catch(e) { return null; }
    }

    function showToast(msg) {
      const el = document.getElementById('toast');
      if (!el) return;
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), 3500);
    }

    function initials(name) {
      if (!name) return '??';
      const p = name.trim().split(' ');
      return p.length === 1 ? p[0].slice(0,2).toUpperCase() : (p[0][0]+p[p.length-1][0]).toUpperCase();
    }

      'England':'рҹҸҙу Ғ§у Ғўу ҒҘу Ғ®у Ғ§у Ғҝ','Portugal':'рҹҮөрҹҮ№','Netherlands':'рҹҮірҹҮұ','Belgium':'рҹҮ§рҹҮӘ',
      'Italy':'рҹҮ®рҹҮ№','Uruguay':'рҹҮәрҹҮҫ','Mexico':'рҹҮІрҹҮҪ','United States':'рҹҮәрҹҮё','USA':'рҹҮәрҹҮё',
      'Canada':'рҹҮЁрҹҮҰ','Japan':'рҹҮҜрҹҮө','South Korea':'рҹҮ°рҹҮ·','Korea Republic':'рҹҮ°рҹҮ·',
      'Australia':'рҹҮҰрҹҮә','Morocco':'рҹҮІрҹҮҰ','Senegal':'рҹҮёрҹҮі','Ghana':'рҹҮ¬рҹҮӯ',
      'Ecuador':'рҹҮӘрҹҮЁ','Croatia':'рҹҮӯрҹҮ·','Switzerland':'рҹҮЁрҹҮӯ','Poland':'рҹҮөрҹҮұ',
      'Denmark':'рҹҮ©рҹҮ°','Serbia':'рҹҮ·рҹҮё','Colombia':'рҹҮЁрҹҮҙ','Saudi Arabia':'рҹҮёрҹҮҰ',
      'Iran':'рҹҮ®рҹҮ·','Cameroon':'рҹҮЁрҹҮІ','Tunisia':'рҹҮ№рҹҮі','Qatar':'рҹҮ¶рҹҮҰ','Wales':'рҹҸҙу Ғ§у Ғўу Ғ·у Ғ¬у Ғіу Ғҝ',
      'Costa Rica':'рҹҮЁрҹҮ·','Ghana':'рҹҮ¬рҹҮҰ'
    };
    function getFlag(name) { return FLAGS[name] || 'рҹҸіпёҸ'; }

    window.addEventListener('DOMContentLoaded', async function() {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }

      currentUser = session.user;
      await loadProfile();
      initDarkMode();
      initUserMenu();
      loadBrackets();
    });

    supabase = null; // serГЎ inicializado no DOMContentLoaded
  </script>

  <script src="js/app.js"></script>
  <script src="js/brackets.js"></script>
  <script src="js/pickem.js"></script>
  <script src="js/ranking.js"></script>
</body>
</html>
