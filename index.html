<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolão Copa 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

  <div class="auth-bg">
    <div class="auth-overlay"></div>
    <img src="https://images.unsplash.com/photo-1522778119026-d647f0596c20?w=1600&q=80" alt="Estádio" class="auth-bg-img">
  </div>

  <main class="auth-container">
    <div class="auth-card" id="authCard">

      <div class="auth-logo">
        <div class="auth-trophy">🏆</div>
        <h1>Bolão Copa <span>2026</span></h1>
        <p>Mostre que você sabe de futebol</p>
      </div>

      <div class="auth-tabs" id="authTabs">
        <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Entrar</button>
        <button class="auth-tab" data-tab="register" onclick="switchAuthTab('register')">Cadastrar</button>
      </div>

      <div id="formLogin" class="auth-form">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="loginPass">Senha</label>
          <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div id="loginError" class="form-error" style="display:none"></div>
        <button class="btn-primary" id="btnLogin">
          <span>Entrar</span>
        </button>
        <div class="auth-divider"><span>ou continue com</span></div>
        <button class="btn-social" id="btnGoogle">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Entrar com Google
        </button>
        <button class="btn-outline" id="btnCpf">Entrar com CPF</button>
      </div>

      <div id="formRegister" class="auth-form" style="display:none">
        <div class="form-group">
          <label for="regName">Nome completo</label>
          <input type="text" id="regName" placeholder="Seu nome" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="regPass">Senha</label>
          <input type="password" id="regPass" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
        </div>
        <div id="registerError" class="form-error" style="display:none"></div>
        <button class="btn-primary" id="btnRegister">
          <span>Criar conta</span>
        </button>
        <div class="auth-divider"><span>ou cadastre com</span></div>
        <button class="btn-social" id="btnGoogleReg">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Cadastrar com Google
        </button>
      </div>

    </div>
  </main>

  <div class="modal-overlay" id="cpfModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Entrar com CPF</h3>
        <button class="modal-close" id="btnCloseCpf">✕</button>
      </div>
      <div class="form-group">
        <label for="cpfInput">CPF</label>
        <input type="text" id="cpfInput" placeholder="000.000.000-00" maxlength="14">
      </div>
      <div class="form-group">
        <label for="cpfPass">Senha</label>
        <input type="password" id="cpfPass" placeholder="••••••••">
      </div>
      <div id="cpfError" class="form-error" style="display:none"></div>
      <button class="btn-primary" id="btnCpfLogin">Entrar</button>
    </div>
  </div>

  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <script>
    const SUPABASE_URL = 'https://olzcsczypoaqpntzfbsv.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_GD9R_nDQNxlZY5F0lNaCnw_CUAKm6eX';
    let sb;

    function initApp() {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      sb.auth.getSession().then(({ data }) => {
        if (data.session) window.location.href = 'app.html';
      });

      sb.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' && session) window.location.href = 'app.html';
      });

      document.getElementById('btnLogin').onclick = doEmailLogin;
      document.getElementById('btnRegister').onclick = doEmailRegister;
      document.getElementById('btnGoogle').onclick = doGoogleLogin;
      document.getElementById('btnGoogleReg').onclick = doGoogleLogin;
      document.getElementById('btnCpf').onclick = showCpfModal;
      document.getElementById('btnCloseCpf').onclick = hideCpfModal;
      document.getElementById('btnCpfLogin').onclick = doCpfLogin;
      document.getElementById('cpfInput').oninput = function() { maskCPF(this); };
      document.getElementById('cpfModal').onclick = function(e) {
        if (e.target === this) hideCpfModal();
      };
      document.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        const active = document.querySelector('.auth-form:not([style*="none"])');
        if (!active) return;
        if (document.getElementById('formLogin') === active) doEmailLogin();
        else doEmailRegister();
      });
    }

    function switchAuthTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });
      document.getElementById('formLogin').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('formRegister').style.display = tab === 'register' ? 'block' : 'none';
    }

    async function doEmailLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value;
      clearError('loginError');
      if (!email || !pass) { showError('loginError', 'Preencha e-mail e senha.'); return; }
      const btn = document.getElementById('btnLogin');
      btn.disabled = true;
      btn.querySelector('span').textContent = 'Entrando...';
      const { error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) {
        showError('loginError', traduceErro(error.message));
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Entrar';
      }
    }

    async function doEmailRegister() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPass').value;
      clearError('registerError');
      if (!name || !email || !pass) { showError('registerError', 'Preencha todos os campos.'); return; }
      if (pass.length < 8) { showError('registerError', 'Senha deve ter pelo menos 8 caracteres.'); return; }
      const btn = document.getElementById('btnRegister');
      btn.disabled = true;
      btn.querySelector('span').textContent = 'Criando conta...';
      const { data, error } = await sb.auth.signUp({ email, password: pass, options: { data: { name } } });
      if (error) {
        showError('registerError', traduceErro(error.message));
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Criar conta';
        return;
      }
      if (data.user) {
        await sb.from('profiles').upsert({ id: data.user.id, name, email, created_at: new Date().toISOString() });
      }
      if (data.session) {
        window.location.href = 'app.html';
      } else {
        showToast('Verifique seu e-mail para confirmar a conta! 📧');
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Criar conta';
      }
    }

    async function doGoogleLogin() {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/app.html' }
      });
      if (error) showToast('Erro: ' + error.message);
    }

    function showCpfModal() { document.getElementById('cpfModal').classList.add('open'); }
    function hideCpfModal() { document.getElementById('cpfModal').classList.remove('open'); }

    function maskCPF(el) {
      let v = el.value.replace(/\D/g, '').slice(0, 11);
      if (v.length > 9) v = v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6,9)+'-'+v.slice(9);
      else if (v.length > 6) v = v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6);
      else if (v.length > 3) v = v.slice(0,3)+'.'+v.slice(3);
      el.value = v;
    }

    async function doCpfLogin() {
      const cpf = document.getElementById('cpfInput').value.replace(/\D/g, '');
      const pass = document.getElementById('cpfPass').value;
      clearError('cpfError');
      if (cpf.length !== 11) { showError('cpfError', 'CPF inválido.'); return; }
      if (!pass) { showError('cpfError', 'Informe a senha.'); return; }
      const email = cpf + '@cpf.bolao2026.app';
      const { error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) {
        const { data: sd, error: se } = await sb.auth.signUp({ email, password: pass, options: { data: { name: 'Usuário ' + cpf.slice(0,3) + '***', cpf } } });
        if (se) showError('cpfError', 'CPF ou senha incorretos.');
        else if (sd?.session) window.location.href = 'app.html';
      }
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.style.display = 'block';
    }
    function clearError(id) {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    }
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3500);
    }
    function traduceErro(msg) {
      const map = {
        'Invalid login credentials': 'E-mail ou senha incorretos.',
        'Email not confirmed': 'Confirme seu e-mail antes de entrar.',
        'User already registered': 'Este e-mail já está cadastrado.',
      };
      return map[msg] || msg;
    }

    // Inicia depois que a página toda carregou
    window.addEventListener('DOMContentLoaded', function() {
      if (window.supabase) {
        initApp();
      } else {
        document.querySelector('script[src*="supabase"]').addEventListener('load', initApp);
      }
    });
  </script>
</body>
</html>
