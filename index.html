<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolão Copa 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

  <div class="auth-bg">
    <div class="auth-overlay"></div>
    <img
      src="https://images.unsplash.com/photo-1522778119026-d647f0596c20?w=1600&q=80"
      alt="Estádio de futebol visto de baixo"
      class="auth-bg-img"
    >
  </div>

  <main class="auth-container">
    <div class="auth-card" id="authCard">

      <div class="auth-logo">
        <div class="auth-trophy">🏆</div>
        <h1>Bolão Copa <span>2026</span></h1>
        <p>Mostre que você sabe de futebol</p>
      </div>

      <!-- TABS -->
      <div class="auth-tabs" id="authTabs">
        <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Entrar</button>
        <button class="auth-tab" data-tab="register" onclick="switchAuthTab('register')">Cadastrar</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="formLogin" class="auth-form">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="loginPass">Senha</label>
          <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div id="loginError" class="form-error" style="display:none"></div>
        <button class="btn-primary" onclick="doEmailLogin()" id="btnLogin">
          <span>Entrar</span>
        </button>
        <div class="auth-divider"><span>ou continue com</span></div>
        <button class="btn-social" onclick="doGoogleLogin()">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Entrar com Google
        </button>
        <button class="btn-outline" onclick="showCpfModal()">Entrar com CPF</button>
      </div>

      <!-- REGISTER FORM -->
      <div id="formRegister" class="auth-form" style="display:none">
        <div class="form-group">
          <label for="regName">Nome completo</label>
          <input type="text" id="regName" placeholder="Seu nome" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="regPass">Senha</label>
          <input type="password" id="regPass" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
        </div>
        <div id="registerError" class="form-error" style="display:none"></div>
        <button class="btn-primary" onclick="doEmailRegister()" id="btnRegister">
          <span>Criar conta</span>
        </button>
        <div class="auth-divider"><span>ou cadastre com</span></div>
        <button class="btn-social" onclick="doGoogleLogin()">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Cadastrar com Google
        </button>
      </div>

    </div>
  </main>

  <!-- CPF MODAL -->
  <div class="modal-overlay" id="cpfModal" onclick="hideCpfModal(event)">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Entrar com CPF</h3>
        <button class="modal-close" onclick="hideCpfModal()">✕</button>
      </div>
      <div class="form-group">
        <label for="cpfInput">CPF</label>
        <input type="text" id="cpfInput" placeholder="000.000.000-00" maxlength="14" oninput="maskCPF(this)">
      </div>
      <div class="form-group">
        <label for="cpfPass">Senha</label>
        <input type="password" id="cpfPass" placeholder="••••••••">
      </div>
      <div id="cpfError" class="form-error" style="display:none"></div>
      <button class="btn-primary" onclick="doCpfLogin()">Entrar</button>
    </div>
  </div>

<!-- TOAST -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <script>
    window.addEventListener('load', function() {
      var s1 = document.createElement('script');
      s1.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
      s1.onload = function() {
        var s2 = document.createElement('script'); s2.src = 'js/config.js';
        s2.onload = function() {
          var s3 = document.createElement('script'); s3.src = 'js/auth.js';
          document.body.appendChild(s3);
        };
        document.body.appendChild(s2);
      };
      document.body.appendChild(s1);
    });
  </script>
</body>
</html>
